name: Download File 2

permissions:
  contents: write

on:
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Download File
      run: |
        curl -L http://docs.google.com/spreadsheets/d/1sdOV2YBS3Rw5HGwN7Tx8VYpxyyGS5gkfNU3-Qx9wdDI/export?format=tsv --output ./entryform/file.tsv
      working-directory: ${{ github.workspace }}
    - name: Commit and Push Changes
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"

    
        git add entryform
        git add file.tsv
        git commit -m 'Update downloaded file'
        git add docs
        git push
