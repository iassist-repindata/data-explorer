name: Download File

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Download File
      run: |
        curl -Lhttp://docs.google.com/spreadsheets/d/1b7ecd8bVoOZ0i4eBvUl10Um6cUHhby9xhL5i_z8iPps/export?format=tsv&gid=2066634449 --output ./file.csv
      working-directory: ${{ github.workspace }}
    - name: Commit and Push Changes
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
    
        git add file.csv
        git commit -m 'Update downloaded file'
        git push
