name: Download File

permissions:
  contents: write

on:
  schedule:
    - cron: "0 15 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Download File
      run: |
        curl -L http://docs.google.com/spreadsheets/d/1sdOV2YBS3Rw5HGwN7Tx8VYpxyyGS5gkfNU3-Qx9wdDI/export?format=tsv --output autosave/form-snapshot.tsv
      working-directory: ${{ github.workspace }}
    - name: Commit and Push Changes
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
    
        git add autosave/form-snapshot.tsv
        git commit -m 'Update downloaded file'
        git push
