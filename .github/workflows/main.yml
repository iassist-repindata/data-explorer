name: Download File

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Download File
      run: |
        curl -X GET http://docs.google.com/spreadsheets/d/1b7ecd8bVoOZ0i4eBvUl10Um6cUHhby9xhL5i_z8iPps/export?format=tsv --output ./file.tsv
      working-directory: ${{ github.workspace }}
